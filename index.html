<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homenagem de Aniversário - Pai</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

        :root { 
            --bg: #1e1e1e; 
            --sidebar: #252526; 
            --text: #d4d4d4; 
            --key: #569cd6; 
            --string: #ce9178; 
            --comment: #6a9955; 
            --func: #dcdcaa; 
            --gold: #ffcc00;
        }

        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'JetBrains Mono', monospace; 
            margin: 0; 
            display: flex; 
            height: 100vh;
            overflow: hidden;
        }

        .sidebar { width: 50px; background: var(--sidebar); border-right: 1px solid #333; display: flex; flex-direction: column; align-items: center; padding-top: 20px; font-size: 20px; color: #858585; flex-shrink: 0; user-select: none; }
        
        .editor { flex: 1; padding: 0; display: flex; flex-direction: column; overflow: hidden; }
        
        .birthday-banner { background-color: #2a2a2a; color: var(--gold); padding: 15px 25px; border-bottom: 2px solid var(--gold); font-size: 16px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 10; }

        .editor-body { flex: 1; overflow-y: auto; padding: 20px; scrollbar-width: thin; scrollbar-color: #444 #1e1e1e; }
        .editor-body::-webkit-scrollbar { width: 8px; }
        .editor-body::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        
        .line-numbers { color: #858585; text-align: right; padding-right: 20px; font-size: 14px; float: left; user-select: none; line-height: 1.7; }
        
        .code-content { float: left; font-size: 14px; line-height: 1.7; white-space: pre-wrap; width: calc(100% - 80px); max-width: 900px; }
        
        h1.file-name { font-size: 18px; color: #4ec9b0; margin: 0 0 20px 0; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        
        .gallery-block { margin: 25px 0; border: 1px solid #3e3e3e; border-radius: 12px; padding: 15px; background: #252526; display: block; clear: both; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        .java-loop { color: var(--comment); font-style: italic; font-size: 13px; display: block; margin-bottom: 15px; }

        .photo-card { margin-bottom: 30px; border-radius: 12px; overflow: hidden; background: #1e1e1e; border: 1px solid #444; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        
        .father-photo { width: 100%; max-width: 500px; display: block; margin: 0 auto; height: auto; }
        
        .photo-caption { padding: 15px; font-size: 12px; color: #b0b0b0; text-align: center; font-style: italic; border-top: 1px solid #333; background: #1a1a1a; }

        .keyword { color: var(--key); font-weight: bold; } 
        .string { color: var(--string); } 
        .comment { color: var(--comment); font-style: italic; } 
        .func { color: var(--func); }
